<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajasthan Shiksha Portal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #e6ebee; margin:0; padding:10px; }
        .box { max-width: 450px; margin: auto; }
        
        /* Initial State: Only Portal is visible */
        #portal-view { display: block; }
        #login-view { display: none; }
        #chat-view { display: none; }

        .header { background: #1a5f7a; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        
        .portal-btn { 
            background: white; padding: 25px 10px; border-radius: 12px; font-weight: bold; border: none; 
            cursor: pointer !important; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-size: 14px;
        }

        #chat-box { 
            height: 80vh; background: #d1d7db; border-radius: 15px; 
            display: flex; flex-direction: column; overflow-y: auto; padding: 15px; 
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
        }

        /* Telegram Style Bubbles */
        .msg { padding: 8px 12px; border-radius: 15px; margin-bottom: 8px; max-width: 75%; font-size: 15px; position: relative; }
        
        /* My Message (Right Side) */
        .sent { background: #efffde; align-self: flex-end; border-bottom-right-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }
        
        /* Her Message (Left Side) */
        .received { background: #ffffff; align-self: flex-start; border-bottom-left-radius: 2px; box-shadow: 0 1px 2px rgba(0,0,0,0.2); }

        .sender-name { font-size: 10px; font-weight: bold; color: #3498db; display: block; margin-bottom: 2px; }

        .input-area { background: white; padding: 10px; display: flex; align-items: center; gap: 8px; border-radius: 0 0 15px 15px; }
        #message-input { flex: 1; border: none; padding: 10px; border-radius: 20px; background: #f0f2f5; outline: none; }
        .send-btn { background: #1a5f7a; color: white; border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 18px; }
    </style>
</head>
<body>

<div id="portal-view" class="box">
    <div class="header"><h3>राजस्थान शिक्षा पोर्टल</h3><p>सत्र 2024-25</p></div>
    <div class="btn-grid">
        <button class="portal-btn" onclick="openLogin()">SSC / Rajasthan Police</button>
        <button class="portal-btn" onclick="openLogin()">NEET / Medical</button>
        <button class="portal-btn" onclick="openLogin()">Arts Group</button>
        <button class="portal-btn" onclick="openLogin()">Agriculture Notes</button>
    </div>
</div>

<div id="login-view" class="box" style="background:white; padding:30px; border-radius:15px; margin-top:50px; text-align:center;">
    <h3>Verification</h3>
    <input type="text" id="passCode" placeholder="Enter Registration Code" style="width:85%; padding:12px; margin-bottom:15px; border:1px solid #ccc; border-radius:8px;">
    <button onclick="doLogin()" style="width:90%; padding:12px; background:#1a5f7a; color:white; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">Verify Code</button>
</div>

<div id="chat-view" class="box">
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="message-input" placeholder="Type message...">
        <button class="send-btn" onclick="send()">➤</button>
    </div>
</div>

<script>
     const firebaseConfig = { databaseURL: "https://puku-chats-1-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Laptop 'A', Mobile 'K'
    const myName = window.innerWidth > 800 ? "A" : "K";

    function openLogin() {
        document.getElementById('portal-view').style.display = 'none';
        document.getElementById('login-view').style.display = 'block';
    }

    function doLogin() {
        if (document.getElementById('passCode').value === "#AK") {
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('chat-view').style.display = 'block';
            listenMessages();
        } else { alert("Server Error: Incorrect Registration Code!"); }
    }

    function send() {
        const text = document.getElementById('message-input').value;
        if(text.trim() !== "") {
            db.ref("messages").push().set({ sender: myName, text: text, time: Date.now() });
            document.getElementById('message-input').value = "";
        }
    }

    function listenMessages() {
        db.ref("messages").on("child_added", (snapshot) => {
            const data = snapshot.val();
            const div = document.createElement("div");
            
            // Telegram Style Logic
            const isMe = data.sender === myName;
            div.className = "msg " + (isMe ? "sent" : "received");
            
            div.innerHTML = <span class="sender-name">${data.sender}</span>${data.text};
            const room = document.getElementById('chat-box');
            room.appendChild(div);
            room.scrollTop = room.scrollHeight;
        });
    }
</script>
</body>
</html>
