<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajasthan Shiksha Portal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; margin:0; padding:10px; text-align: center; }
        .header { background: #1a5f7a; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 400px; margin: auto; }
        .btn { background: white; padding: 25px 10px; border-radius: 10px; font-weight: bold; border: 1px solid #ddd; cursor: pointer; }
        #secret-zone, #chat-room-container { display: none; background: white; padding: 20px; border-radius: 10px; max-width: 400px; margin: 20px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        #chat-room { height: 350px; overflow-y: auto; background: #e5ddd5; padding: 10px; display: flex; flex-direction: column; border-radius: 10px; margin-bottom: 10px; text-align: left; }
        .msg { padding: 8px 12px; border-radius: 10px; margin-bottom: 5px; max-width: 75%; font-size: 14px; word-wrap: break-word; position: relative; }
        .sent { background: #dcf8c6; align-self: flex-end; border-bottom-right-radius: 0; }
        .received { background: white; align-self: flex-start; border-bottom-left-radius: 0; }
        input { width: 75%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #1a5f7a; color: white; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="main-portal">
    <div class="header"><h3>राजस्थान शिक्षा पोर्टल</h3><p>सत्र 2024-25</p></div>
    <div class="btn-grid">
        <div class="btn" onclick="openGate()">SSC / Rajasthan Police</div>
        <div class="btn" onclick="openGate()">Medical / NEET</div>
        <div class="btn" onclick="openGate()">Arts Group</div>
        <div class="btn" onclick="openGate()">Agriculture Notes</div>
    </div>
</div>

<div id="secret-zone">
    <h3>Verification Required</h3>
    <input type="text" id="regCode" placeholder="Registration Code (Mandatory)">
    <button onclick="verify()">Submit</button>
</div>

<div id="chat-room-container">
    <div style="background:#1a5f7a; color:white; padding:10px; border-radius:5px 5px 0 0; margin-bottom:10px;">Private Vault</div>
    <div id="chat-room"></div>
    <div style="display:flex; gap:5px;">
        <input type="text" id="message" placeholder="Type safely...">
        <button onclick="send()">➤</button>
    </div>
</div>

<script>
    // ISME APNA DATABASE URL CHIPKAO
    const firebaseConfig = {
        databaseURL: "https://puku-chats-1-default-rtdb.firebaseio.com"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function openGate() {
        document.getElementById('main-portal').style.display = 'none';
        document.getElementById('secret-zone').style.display = 'block';
    }

    function verify() {
        if (document.getElementById('regCode').value === "#AK") {
            document.getElementById('secret-zone').style.display = 'none';
            document.getElementById('chat-room-container').style.display = 'block';
            listenMessages();
        } else { alert("Connection Error: Try again later."); }
    }

    function send() {
        const text = document.getElementById('message').value;
        if(text.trim() !== "") {
            db.ref("messages").push().set({
                text: text,
                sender: "Aayush", 
                timestamp: Date.now()
            });
            document.getElementById('message').value = "";
        }
    }

    function listenMessages() {
        db.ref("messages").on("child_added", (snapshot) => {
            const msg = snapshot.val();
