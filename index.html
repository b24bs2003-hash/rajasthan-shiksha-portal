<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rajasthan Portal</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: sans-serif; background: #e6ebee; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        
        /* Hide sections by default */
        #login-section, #chat-section { display: none; }

        .btn { 
            width: 100%; padding: 15px; margin: 10px 0; 
            background: #1a5f7a; color: white; border: none; 
            border-radius: 5px; font-weight: bold; cursor: pointer;
            font-size: 16px;
        }

        #chat-box { height: 350px; overflow-y: auto; background: #f9f9f9; border: 1px solid #ddd; margin-bottom: 10px; padding: 10px; display: flex; flex-direction: column; }
        .msg { padding: 8px; margin: 5px; border-radius: 5px; max-width: 70%; word-wrap: break-word; }
        .sent { background: #dcf8c6; align-self: flex-end; } /* Aapka (Laptop) */
        .received { background: #fff; border: 1px solid #ccc; align-self: flex-start; } /* Uska (Mobile) */

        .input-area { display: flex; gap: 5px; }
        #message-input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
    </style>
</head>
<body>

<div id="portal-section" class="container">
    <h2 style="background:#1a5f7a; color:white; padding:10px; border-radius:5px;">राजस्थान पोर्टल</h2>
    <button class="btn" onclick="goToLogin()">SSC / Rajasthan Police</button>
    <button class="btn" onclick="goToLogin()">Medical / NEET</button>
    <button class="btn" onclick="goToLogin()">Arts / Agriculture</button>
</div>

<div id="login-section" class="container">
    <h3>Enter PERCENTAGE </h3>
    <input type="text" id="passCode" placeholder="Code..." style="width:80%; padding:10px; margin-bottom:10px;">
    <button class="btn" onclick="checkCode()">Verify & Login</button>
</div>

<div id="chat-section" class="container">
    <div id="chat-box"></div>
    <div class="input-area">
        <input type="text" id="message-input" placeholder="Type here...">
        <button onclick="sendMsg()" style="padding:10px; background:#1a5f7a; color:white; border:none; border-radius:5px;">Send</button>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://puku-chats-1-default-rtdb.firebaseio.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Ab hum manually decide karenge
    let uTag = ""; 

    function goLog() {
        document.getElementById('portal-view').style.display = 'none';
        document.getElementById('login-view').style.display = 'block';
    }

    function validate() {
        const val = document.getElementById('rollNo').value;
        
        // Agar tum #AK bharoge to tum "A" (Admin/Sachin)
        if(val === "#AK") {
            uTag = "A";
            startSystem();
        } 
        // Agar wo #KA bharegi to wo "K" (Puku)
        else if(val === "#KA") {
            uTag = "K";
            startSystem();
        }
        else {
            alert("Error: Student Record Not Found.");
        }
    }

    function startSystem() {
        document.getElementById('login-view').style.display = 'none';
        document.getElementById('chat-view').style.display = 'block';
        load();
    }

    function send() {
        const t = document.getElementById('m-input').value;
        if(t.trim() !== "") {
            db.ref("messages").push().set({ s: uTag, m: t, time: Date.now() });
            document.getElementById('m-input').value = "";
        }
    }

    function load() {
        db.ref("messages").on("child_added", (snap) => {
            const d = snap.val();
            const div = document.createElement("div");
            // Telegram Look: Tera message right, uska left
            const isMe = d.s === uTag;
            div.className = "msg " + (isMe ? "sent" : "received");
            div.innerHTML = <b>${d.s}:</b> ${d.m};
            document.getElementById('chat-box').appendChild(div);
            document.getElementById('chat-box').scrollTop = document.getElementById('chat-box').scrollHeight;
        });
    }
</script>
</body>
</html>
